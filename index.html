<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Fever</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* background image covering full window */
            background: url("assets/main-bg.png") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/SoundManager.js"></script>
    <script src="js/objects/Player.js"></script>
    <script src="js/objects/Bullet.js"></script>
    <script src="js/objects/Asteroid.js"></script>
    <script src="js/objects/AsteroidXL.js"></script>
    <script src="js/objects/Buggy.js"></script>
    <script src="js/objects/Atom.js"></script>
    <script src="js/PowerUpManager.js"></script>
    <script src="js/scenes/TitleScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
